# Ollama Environment Configuration
# This file contains optimized settings for Ollama performance

# Network Configuration
OLLAMA_HOST=127.0.0.1:11434
OLLAMA_ORIGINS=http://localhost:3001,http://127.0.0.1:3001

# Performance Optimization
OLLAMA_KEEP_ALIVE=24h
OLLAMA_NUM_PARALLEL=2
OLLAMA_MAX_LOADED_MODELS=2
OLLAMA_FLASH_ATTENTION=1

# Model Storage
OLLAMA_MODELS=/home/daniel/.ollama/models

# Memory and Processing
OLLAMA_MAX_QUEUE=512
OLLAMA_RUNNERS_DIR=/tmp/ollama_runners

# Logging
OLLAMA_DEBUG=false
OLLAMA_LOGS=/var/log/ollama

# System Optimization
OLLAMA_NUMA_AWARE=true