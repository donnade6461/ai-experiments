general:
  instance_name: "AI Dev Search"
  debug: false
  enable_metrics: true

search:
  safe_search: 0  # No restrictions for research
  autocomplete: "google"
  default_lang: "en"
  formats:
    - html
    - json

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "73840c60c2165b5a28f26dfbd884879776dd8d7bdec5a61f453a6898bbabe95b"
  base_url: "http://localhost:8081"
  image_proxy: true
  method: "GET"

outgoing:
  request_timeout: 5.0
  max_request_timeout: 15.0
  pool_connections: 200
  pool_maxsize: 50
  enable_http2: true

ui:
  static_use_hash: true
  default_locale: "en"
  query_in_title: false
  infinite_scroll: true
  center_alignment: false

# Optimized engines for developers/researchers
engines:
  # Programming & Tech
  - name: stackoverflow
    engine: stackoverflow
    categories: it
    disabled: false
    
  - name: github
    engine: github
    categories: it
    disabled: false
    
  - name: gitlab
    engine: gitlab
    categories: it
    disabled: false
    
  # Academic & Research
  - name: arxiv
    engine: arxiv
    categories: science
    disabled: false
    
  - name: semantic_scholar
    engine: semantic_scholar  
    categories: science
    disabled: false
    
  # General Search
  - name: google
    engine: google
    categories: general
    disabled: false
    use_mobile_ui: false
    
  - name: bing
    engine: bing
    categories: general
    disabled: false
    
  - name: duckduckgo
    engine: duckduckgo
    categories: general
    disabled: false
    
  # Documentation
  - name: devdocs
    engine: devdocs
    categories: it
    disabled: false